appId: com.skilldock.desktop
productName: SkillDock
directories:
  output: apps/desktop/dist/packaged
  buildResources: apps/desktop/build
asar: true
asarUnpack:
  - apps/server/dist/**/*
  - apps/web/dist/**/*
  - apps/desktop/dist/preload.js
files:
  - apps/desktop/dist/**/*
  - apps/server/dist/**/*
  - apps/web/dist/**/*
  - packages/shared/dist/**/*
  - package.json
extraMetadata:
  main: apps/desktop/dist/main.js
icon: apps/desktop/build/icon.png
win:
  target:
    - nsis
  icon: apps/desktop/build/icon.ico
mac:
  target:
    - dmg
  icon: apps/desktop/build/icon.iconset
artifactName: skilldock-${version}-${os}-${arch}.${ext}
