name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    name: Build desktop (${{ matrix.platform.label }})
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: windows
            os: windows-latest
            dist_command: pnpm dist:desktop:win
            artifact_name: skilldock-desktop-windows
            artifact_path: apps/desktop/dist/packaged/*.exe
          - label: macos
            os: macos-latest
            dist_command: pnpm dist:desktop:mac
            artifact_name: skilldock-desktop-macos
            artifact_path: apps/desktop/dist/packaged/*.dmg

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build desktop package
        run: ${{ matrix.platform.dist_command }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error

  publish-release:
    name: Publish desktop release assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-desktop
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show release artifacts
        shell: bash
        run: ls -R release-artifacts

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.exe
            release-artifacts/*.dmg
